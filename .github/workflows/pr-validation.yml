name: PR Validation

on:
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Check Formatting & Lint
        run: bun run check

      - name: Run Tests
        run: bun test